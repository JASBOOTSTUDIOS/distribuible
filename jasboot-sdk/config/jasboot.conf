# Configuracion del Sistema Jasboot v1.0
# Este archivo controla el comportamiento del compilador y la VM

[paths]
# Rutas relativas desde el directorio raiz del SDK
runtime = ./runtime
temp = ./temp
output = ./build
examples = ./examples

[compiler]
# Opciones del compilador jbc
optimization = O2
debug_symbols = false
target_ir = v1
warnings = true
strict_mode = false
output_format = jbo

[vm]
# Configuracion de la Maquina Virtual jasboot-ir-vm
memory_limit = 256MB
stack_size = 1MB
jmn_enabled = true
max_execution_time = 30000
enable_profiling = false

[jmn]
# Configuracion de la Memoria Neuronal
default_file = jasboot_memory.jmn
max_concepts = 10000
association_weight_limit = 1000
auto_save = true
compression = false

[io]
# Configuracion de entrada/salida
buffer_size = 4096
encoding = utf-8
line_ending = windows
color_output = true

[network]
# Configuracion de red (si aplica)
enable_network = false
timeout = 5000
max_connections = 10

[debug]
# Opciones de depuracion
verbose = false
trace_execution = false
log_file = jasboot.log
log_level = warning

[security]
# Configuracion de seguridad
sandbox_mode = false
file_access = read_write
network_access = false
system_calls = restricted
